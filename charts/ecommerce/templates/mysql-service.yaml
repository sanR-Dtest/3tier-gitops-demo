apiVersion: v1
kind: Service
metadata:
  name: {{ include "ecommerce.fullname" . }}-mysql
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "ecommerce.labels" . | nindent 4 }}
    component: mysql
spec:
  clusterIP: None
  type: {{ .Values.mysql.service.type }}
  ports:
  - port: {{ .Values.mysql.service.port }}
    targetPort: mysql
    protocol: TCP
    name: mysql
  selector:
    {{- include "ecommerce.selectorLabels" . | nindent 4 }}
    component: mysql
